services:
  app:
    build: .
    ports:
      - "3000:8080"
    env_file:
      - path: .env.local
        required: false
    environment:
      - DATABASE_URL=postgresql://test:test@db:5432/daily_report_test
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node server.js"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: daily_report_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d daily_report_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
